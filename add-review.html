     <section id="review-box">
  <h2>Add Rating / Comment</h2>

  <form action="https://682cc1751493e851fe0b1657--glittering-starship-bcb8dd.netlify.app/index.html">
    <label>Rating:</label>
    <div class="stars">
      <input type="radio" id="star5" name="rating" value="5"><label for="star5">&#9733;</label>
      <input type="radio" id="star4" name="rating" value="4"><label for="star4">&#9733;</label>
      <input type="radio" id="star3" name="rating" value="3"><label for="star3">&#9733;</label>
      <input type="radio" id="star2" name="rating" value="2"><label for="star2">&#9733;</label>
      <input type="radio" id="star1" name="rating" value="1"><label for="star1">&#9733;</label>
    </div>

    <label for="comment">Comment:</label>
    <textarea id="comment" name="comment" rows="4"></textarea>

    <br><br>
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
  </form>
</section>

     
  <footer>
    <p>© 2025 Umm Al-Qura University - All rights reserved.</p>
  </footer>


<script>

     // Access the form and comment field
  var form = document.querySelector("form");
  var commentField = document.getElementById("comment");

  // Add a submit event listener
  form.addEventListener("submit", function(event) {
    event.preventDefault(); // Prevent default form submission

    // Check if a rating is selected
    var selectedRating = document.querySelector('input[name="rating"]:checked');
    if (!selectedRating) {
      alert("Please select a rating.");
      return;
    }

    // Check if comment is written
    var comment = commentField.value;
    if (comment === "") {
      alert("Please write a comment.");
      return;
    }

    // Print values to the console
    console.log("Rating: " + selectedRating.value);
    console.log("Comment: " + comment);

    // Confirm before submission
    var confirmSubmit = confirm("Are you sure you want to submit your review?");
    if (confirmSubmit) {
      // Navigate to the form action URL
      window.location.href = form.action;
    }
  });

  // Add a tooltip to the logo image
 var logo = document.getElementById("Logo");
  logo.title = "Home"; 

// Redirect to homepage when logo is clicked
function goToHomePage() {
    window.location.href = "index.html";
  
}

logo.addEventListener("click", goToHomePage);

</script>
