<!DOCTYPE html>
<html lang="en">
<head><script>
  document.addEventListener("DOMContentLoaded", function () {
  
    // --- Contact Us Form ---
    const contactForm = document.querySelector("form[action='#'][method='POST']");
    if (contactForm) {
      contactForm.addEventListener("submit", function (e) {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const message = document.getElementById("message").value.trim();
  
        if (!name || !email || !message) {
          alert("Please fill in all fields.");
          e.preventDefault();
          return;
        }
  
        if (message.length < 10) {
          alert("Your message should be at least 10 characters.");
          e.preventDefault();
          return;
        }
  
        //  Show success alert
        alert("Form was submitted successfully!");
      });
    }
  
    
  
  });
  
  </script>
  <meta charset="UTF-8">
  <title>Contact Us-UQU BookHub</title>

  <main id="search-contact">
   <form action="#" method="POST">
      <label for="name">Your Name:</label>
      <input type="text" id="name" name="name" placeholder="Real Name"required><br><br>

      <label for="email">Your Email:</label>
      <input type="email" id="email" name="email" placeholder="s4**8@uqu.sa"required><br><br>

      <label for="message">Your Message:</label><br>
      <textarea id="message" name="message" rows="3" cols="50" placeholder="Write here "required></textarea><br><br>

      <input type="submit" value="Send Message">
  </main>
